workflows:
  android-debug:
    name: ChinaFast Teste Android

    max_build_duration: 60

    environment:
      node: 22
      java: 17

    scripts:
      - name: Instalar dependências
        script: |
          npm ci

      - name: Verificar projeto Expo
        script: |
          npx expo-doctor

      - name: Gerar projeto Android
        script: |
          npx expo prebuild --platform android --clean

      - name: Gerar APK Debug
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
