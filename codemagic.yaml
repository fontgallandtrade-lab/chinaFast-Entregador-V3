workflows:
  android-release:
    name: ChinaFast Android Release

    max_build_duration: 60

    environment:
      node: 22
      java: 17

    scripts:
      - name: Instalar dependências
        script: |
          npm ci

      - name: Verificar projeto
        script: |
          npx expo-doctor

      - name: Gerar Android
        script: |
          npx expo prebuild --platform android --clean

      - name: Build Release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Conferir APK
        script: |
          find android/app/build/outputs -type f -name "*.apk" -print

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
